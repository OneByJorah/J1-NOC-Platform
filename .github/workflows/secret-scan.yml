name: Secret Scan
# Defense-in-depth: catches secrets that slip past the local pre-commit hook
# (e.g. git commit --no-verify, or a fresh clone without the hook installed).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks (full history)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # scan entire history, not just the latest commit
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_UPLOAD: "false"
          GITLEAKS_CONFIG: .gitleaks.toml
