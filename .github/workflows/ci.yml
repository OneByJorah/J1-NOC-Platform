name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality:
    name: Backend (lint + type + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies (dev)
        run: uv sync --extra dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy (strict)
        run: uv run mypy app || true   # TODO: enforce once typing coverage is complete

      - name: Pytest + coverage
        run: uv run pytest --cov=app --cov-report=term-missing --cov-fail-under=60

  frontend-quality:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g pnpm
      - run: pnpm install
      - run: pnpm build

  image-scan:
    name: Build + Trivy scan + SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: j1-noc-platform-backend:ci
          load: true

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: "j1-noc-platform-backend:ci"
          format: spdx-json
          output-file: sbom-backend.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-backend
          path: sbom-backend.spdx.json

      - name: Trivy filesystem + image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: "image"
          image-ref: "j1-noc-platform-backend:ci"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true

  dependency-scan:
    name: SCA (dependency audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: pip-audit (Python)
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit -r backend/requirements.txt --strict || true
      - name: pnpm audit (Node)
        working-directory: frontend
        run: |
          npm install -g pnpm
          pnpm audit --audit-level=high || true
