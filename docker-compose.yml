version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jnop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-jnop}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jnop} -d ${POSTGRES_DB:-jnop}"]
      interval: 5s
      timeout: 5s
      retries: 5
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
