# =============================================================================
# PROCESSORS: Add/Modify Tags
# =============================================================================

[[processors.tags]]
  # Add static tags
  [processors.tags.tags]
    noc_platform = "j1noc"
    agent_type = "telegraf"

[[processors.enum]]
  # Convert numeric service status to string
  [[processors.enum.mapping]]
    name = "win_service_status"
    dest = "status_str"
    default = "unknown"
    [processors.enum.mapping.value_mappings]
      1 = "stopped"
      2 = "start_pending"
      3 = "stop_pending"
      4 = "running"
      5 = "continue_pending"
      6 = "pause_pending"
      7 = "paused"

