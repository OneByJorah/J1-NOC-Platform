# Telegraf Configuration for Windows -> J1 NOC Platform
# 
# INSTALLATION:
#   1. Install Telegraf: choco install telegraf
#   2. Copy this file to: C:\Program Files\Telegraf\telegraf.conf
#   3. Set environment variables (see below)
#   4. Restart service: net stop telegraf && net start telegraf
#   5. Or run manually: telegraf --config C:\Program Files\Telegraf\telegraf.conf
#
# ENVIRONMENT VARIABLES (set in System Environment Variables):
#   NOC_URL=http://127.0.0.1:8000
#   TELEGRAF_TOKEN=your-secret-token
#
# TELEGRAF VERSION: 1.30+

[global_tags]
  # Host identification
  host = "$(HOSTNAME)"
  # Optional: site, environment, role
  # site = "datacenter-1"
  # env = "production"
  # role = "fileserver"
  # noc_project = "j1noc"

[agent]
  interval = "60s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "10s"
  flush_interval = "10s"
  flush_jitter = "5s"
  precision = "1s"
  hostname = ""
  omit_hostname = false

# =============================================================================
# OUTPUT: J1 NOC Platform HTTP Endpoint
# =============================================================================

[[outputs.http]]
  url = "${NOC_URL}/api/agent/telegraf"
  method = "POST"
  data_format = "json"
  timeout = "30s"
  headers = {
    Authorization = "Bearer ${TELEGRAF_TOKEN}",
    Content-Type = "application/json"
  }
  # Batch metrics in single request
  batch_size = 100

# =============================================================================
# INPUTS: Windows System Metrics
# =============================================================================

# CPU
[[inputs.win_perf_counters]]
  [[inputs.win_perf_counters.object]]
    ObjectName = "Processor"
    Instances = ["*"]
    Counters = [
      "% Processor Time",
      "% User Time",
      "% Privileged Time",
      "% Interrupt Time",
      "Interrupts/sec"
    ]
    Measurement = "win_cpu"
    IncludeTotal = true

# Memory
[[inputs.win_perf_counters]]
  [[inputs.win_perf_counters.object]]
    ObjectName = "Memory"
    Instances = ["------"]
    Counters = [
      "Available MBytes",
      "Cache Bytes",
      "Committed Bytes",
      "Commit Limit",
      "Pages/sec",
      "Page Reads/sec",
      "Page Writes/sec",
      "Pool Nonpaged Bytes",
      "Pool Paged Bytes"
    ]
    Measurement = "win_memory"

# Disk
[[inputs.win_perf_counters]]
  [[inputs.win_perf_counters.object]]
    ObjectName = "LogicalDisk"
    Instances = ["*"]
    Counters = [
      "% Free Space",
      "Free Megabytes",
      "Disk Bytes/sec",
      "Disk Read Bytes/sec",
      "Disk Write Bytes/sec",
      "Avg. Disk sec/Read",
      "Avg. Disk sec/Write",
      "Current Disk Queue Length"
    ]
    Measurement = "win_disk"

# Network
[[inputs.win_perf_counters]]
  [[inputs.win_perf_counters.object]]
    ObjectName = "Network Interface"
    Instances = ["*"]
    Counters = [
      "Bytes Total/sec",
      "Bytes Received/sec",
      "Bytes Sent/sec",
      "Packets Total/sec",
      "Packets Received/sec",
      "Packets Sent/sec",
      "Packets Received Errors",
      "Packets Outbound Errors"
    ]
    Measurement = "win_net"

# System Uptime
[[inputs.win_perf_counters]]
  [[inputs.win_perf_counters.object]]
    ObjectName = "System"
    Instances = ["------"]
    Counters = [
      "System Up Time"
    ]
    Measurement = "win_system"

# =============================================================================
# INPUTS: Windows Services
# =============================================================================

[[inputs.win_services]]
  # Monitor all services, or specify list:
  # services = ["wuauserv", "Spooler", "Dhcp", "Dnscache", "EventLog", "LanmanServer", "LanmanWorkstation"]
  services = ["*"]
  # Tag service with its status
  tag_service = true

# =============================================================================
# INPUTS: Windows Event Logs
# =============================================================================

[[inputs.win_event_log]]
  # Channels to monitor
  [[inputs.win_event_log.channel]]
    name = "System"
    level = "ERROR"
    # Only last 1 hour on each collection
    # start_at = "now-1h"

  [[inputs.win_event_log.channel]]
    name = "Application"
    level = "ERROR"

  [[inputs.win_event_log.channel]]
    name = "Security"
    level = "ERROR"
    # Security logs need special permissions, comment out if not admin

# =============================================================================
# INPUTS: Google Drive File Stream / CloudSync Logs
# =============================================================================

[[inputs.tail]]
  # Google Drive File Stream logs
  files = [
    "C:\\Program Files\\Google\\Drive File Stream\\logs\\*.log",
    "C:\\Users\\*\\AppData\\Local\\Google\\DriveFS\\logs\\*.log"
  ]
  data_format = "grok"
  grok_patterns = [
    "%{TIMESTAMP_ISO8601:timestamp} %{LOGLEVEL:level} %{GREEDYDATA:message}"
  ]
  grok_custom_patterns = '''
    LOGLEVEL (ERROR|WARN|WARNING|INFO|DEBUG)
  '''
  name_override = "win_log"
  tags = {
    source = "googledrive"
  }
  # Read from beginning or only new
  from_beginning = false
  # Pipe delimiter for multiline
  # pipe_charset = "utf-8"

