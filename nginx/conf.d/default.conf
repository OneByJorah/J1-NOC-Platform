server {
  listen 80;
  server_name _;

  # Admin SPA
  location /admin/ {
    root /usr/share/nginx/html;
    try_files $uri /admin/index.html;
  }

  # Frontend SPA
  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }

  # API proxy (paths already prefixed by frontend/nav: /api/...)
  location /api/ {
    proxy_pass http://172.19.0.1:8000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Backend health check
  location = /healthz {
    proxy_pass http://172.19.0.1:8000/healthz;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Backend legacy/external-facing postbacks
  location = /forcerepl {
    proxy_pass http://172.19.0.1:8000/forcerepl;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
